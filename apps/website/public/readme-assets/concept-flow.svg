<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 640" role="img" aria-labelledby="title desc">
  <title id="title">Concept flow for Optical Adjust</title>
  <desc id="desc">Two-row diagram comparing a normal screen image that becomes blurrier on the retina versus a pre-adjusted screen image that becomes clearer after passing through the same eye blur.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#35506b" />
    </marker>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="2.8" />
    </filter>
    <filter id="hardBlur">
      <feGaussianBlur stdDeviation="5.5" />
    </filter>
  </defs>

  <rect width="1120" height="640" fill="#f7f3ea" />

  <text x="560" y="54" text-anchor="middle" font-family="Georgia, serif" font-size="30" font-weight="700" fill="#23313f">
    Can the computer draw the image so your eye's blur helps instead of hurts?
  </text>

  <text x="150" y="114" text-anchor="middle" font-family="Verdana, sans-serif" font-size="22" font-weight="700" fill="#a34332">
    Without adjustment
  </text>
  <text x="150" y="378" text-anchor="middle" font-family="Verdana, sans-serif" font-size="22" font-weight="700" fill="#2b7a53">
    With computer adjustment
  </text>

  <rect x="40" y="132" width="220" height="150" rx="22" fill="#ffffff" stroke="#d8cabb" stroke-width="3" />
  <rect x="40" y="396" width="220" height="150" rx="22" fill="#ffffff" stroke="#d8cabb" stroke-width="3" />

  <text x="150" y="170" text-anchor="middle" font-family="Verdana, sans-serif" font-size="18" fill="#4f5d6b">
    Screen image
  </text>
  <text x="150" y="434" text-anchor="middle" font-family="Verdana, sans-serif" font-size="18" fill="#4f5d6b">
    Screen image
  </text>

  <text x="150" y="234" text-anchor="middle" font-family="Verdana, sans-serif" font-size="64" font-weight="700" fill="#24384e">
    Aa
  </text>
  <text x="150" y="498" text-anchor="middle" font-family="Verdana, sans-serif" font-size="64" font-weight="700" fill="#24384e">
    Aa
  </text>
  <text x="147" y="494" text-anchor="middle" font-family="Verdana, sans-serif" font-size="64" font-weight="700" fill="#d5654f" opacity="0.68">
    Aa
  </text>
  <text x="153" y="502" text-anchor="middle" font-family="Verdana, sans-serif" font-size="64" font-weight="700" fill="#5a8bd4" opacity="0.55">
    Aa
  </text>

  <text x="150" y="264" text-anchor="middle" font-family="Verdana, sans-serif" font-size="14" fill="#6d756f">
    Normal image
  </text>
  <text x="150" y="528" text-anchor="middle" font-family="Verdana, sans-serif" font-size="14" fill="#6d756f">
    Image is bent on purpose
  </text>

  <line x1="265" y1="206" x2="420" y2="206" stroke="#35506b" stroke-width="5" marker-end="url(#arrow)" />
  <line x1="265" y1="470" x2="420" y2="470" stroke="#35506b" stroke-width="5" marker-end="url(#arrow)" />

  <g transform="translate(430 110)">
    <ellipse cx="130" cy="96" rx="108" ry="78" fill="#ffd486" stroke="#ce9e58" stroke-width="3" />
    <ellipse cx="88" cy="96" rx="24" ry="44" fill="#fff8f1" stroke="#c0b4a3" stroke-width="3" />
    <path d="M 190 36 Q 240 96 190 156" fill="none" stroke="#d15454" stroke-width="8" />
    <circle cx="72" cy="96" r="8" fill="#1f2a38" />
    <path d="M -10 80 L 68 88" stroke="#f2c94c" stroke-width="8" />
    <path d="M -10 112 L 68 104" stroke="#f2c94c" stroke-width="8" />
  </g>

  <g transform="translate(430 374)">
    <ellipse cx="130" cy="96" rx="108" ry="78" fill="#ffd486" stroke="#ce9e58" stroke-width="3" />
    <ellipse cx="88" cy="96" rx="24" ry="44" fill="#fff8f1" stroke="#c0b4a3" stroke-width="3" />
    <path d="M 190 36 Q 240 96 190 156" fill="none" stroke="#2b7a53" stroke-width="8" />
    <circle cx="72" cy="96" r="8" fill="#1f2a38" />
    <path d="M -10 80 L 68 88" stroke="#f2c94c" stroke-width="8" />
    <path d="M -10 112 L 68 104" stroke="#f2c94c" stroke-width="8" />
  </g>

  <text x="560" y="146" text-anchor="middle" font-family="Verdana, sans-serif" font-size="18" fill="#4f5d6b">
    Same eye blur
  </text>
  <text x="560" y="410" text-anchor="middle" font-family="Verdana, sans-serif" font-size="18" fill="#4f5d6b">
    Same eye blur
  </text>

  <line x1="690" y1="206" x2="846" y2="206" stroke="#35506b" stroke-width="5" marker-end="url(#arrow)" />
  <line x1="690" y1="470" x2="846" y2="470" stroke="#35506b" stroke-width="5" marker-end="url(#arrow)" />

  <rect x="858" y="132" width="220" height="150" rx="22" fill="#ffffff" stroke="#d8cabb" stroke-width="3" />
  <rect x="858" y="396" width="220" height="150" rx="22" fill="#ffffff" stroke="#d8cabb" stroke-width="3" />

  <text x="968" y="170" text-anchor="middle" font-family="Verdana, sans-serif" font-size="18" fill="#4f5d6b">
    What lands on retina
  </text>
  <text x="968" y="434" text-anchor="middle" font-family="Verdana, sans-serif" font-size="18" fill="#4f5d6b">
    What lands on retina
  </text>

  <text x="968" y="236" text-anchor="middle" font-family="Verdana, sans-serif" font-size="64" font-weight="700" fill="#27405c" filter="url(#hardBlur)" opacity="0.8">
    Aa
  </text>
  <text x="968" y="500" text-anchor="middle" font-family="Verdana, sans-serif" font-size="64" font-weight="700" fill="#27405c" filter="url(#softBlur)" opacity="0.92">
    Aa
  </text>
  <text x="968" y="264" text-anchor="middle" font-family="Verdana, sans-serif" font-size="14" fill="#a34332">
    Too blurry
  </text>
  <text x="968" y="528" text-anchor="middle" font-family="Verdana, sans-serif" font-size="14" fill="#2b7a53">
    Closer to sharp
  </text>
</svg>
