packages:
  - apps/*
  - packages/*
  - tools/*

catalog:
  "@cloudflare/vite-plugin": ^1.30.3
  "@mcp-b/webmcp-types": ^2.2.0
  "@playwright/test": ^1.58.2
  "@types/node": ^24
  "@types/react": ^19.2.14
  "@types/react-dom": ^19.2.3
  "@vitejs/plugin-react": ^6.0.1
  "@vitest/browser-playwright": 4.1.1
  "@vitest/coverage-v8": 4.1.1
  react: ^19.2.4
  react-dom: ^19.2.4
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  wrangler: ^4.79.0

catalogMode: prefer
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
